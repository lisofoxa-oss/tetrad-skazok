<style>
  @import url('https://fonts.googleapis.com/css2?family=Bad+Script&family=Marck+Script&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1520;background-image:radial-gradient(ellipse at 20% 50%,rgba(80,50,90,0.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(40,50,100,0.25) 0%,transparent 50%);padding:40px 20px;font-family:'Bad Script',cursive}.lang-sw{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:4px;background:rgba(30,22,36,0.85);padding:4px;border-radius:8px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.4)}.lb{font-family:'Bad Script',cursive;font-size:0.85rem;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:#8a7a6a;transition:all 0.2s}.lb:hover{color:#e8dcc6}.lb.on{background:#e8dcc6;color:#1a1520}.nb{position:relative;max-width:660px;width:100%;background:#f5eed9;background-image:linear-gradient(rgba(0,0,0,0) 0px,rgba(0,0,0,0) 31px,#c9b99a44 31px,#c9b99a44 32px);background-size:100% 32px;border-radius:4px 12px 12px 4px;padding:48px 50px 60px 70px;box-shadow:-4px 0 0 #e8dcc6,-8px 0 0 #ddd0b8,0 8px 40px rgba(0,0,0,0.5),0 2px 10px rgba(0,0,0,0.3);overflow:hidden}.nb::before{content:'';position:absolute;left:54px;top:0;bottom:0;width:2px;background:rgba(200,80,80,0.3)}.nb::after{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,#ede4cc,#f2e9d2);border-right:1px solid rgba(0,0,0,0.05)}.holes{position:absolute;left:16px;top:0;bottom:0;z-index:2}.hole{width:16px;height:16px;background:#1a1520;border-radius:50%;position:absolute;left:0;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3)}.hole:nth-child(1){top:80px}.hole:nth-child(2){top:280px}.hole:nth-child(3){top:480px}.hole:nth-child(4){top:680px}.hole:nth-child(5){top:880px}.hole:nth-child(6){top:1080px}.ta{text-align:center;margin-bottom:28px;position:relative;z-index:1}.ta h1{font-family:'Marck Script',cursive;font-size:2rem;color:#3a2e28;font-weight:400;letter-spacing:1px;position:relative;display:inline-block}.ta h1::after{content:'';position:absolute;bottom:-4px;left:-10%;width:120%;height:1px;background:linear-gradient(to right,transparent,#8a7a6a,transparent)}.st{position:relative;z-index:1;font-family:'Bad Script',cursive;font-size:1.25rem;line-height:32px;color:#2c2420;text-align:left}.st p{text-indent:2em;margin-bottom:0}.st p+p{margin-top:4px}.fr{float:right;width:200px;height:260px;margin:0 -10px 10px 24px;shape-outside:ellipse(50% 48% at 50% 50%);position:relative}.fr img{width:100%;height:100%;object-fit:contain}.end{text-align:center;margin-top:20px;font-family:'Marck Script',cursive;font-size:1.1rem;color:#8a7a6a;letter-spacing:2px;position:relative;z-index:1}.end::before,.end::after{content:'~';margin:0 12px;opacity:0.5}.ink-s{position:absolute;border-radius:50%;background:rgba(30,25,40,0.06);z-index:1;pointer-events:none}.ink-s:nth-child(1){width:8px;height:8px;top:120px;right:80px}.ink-s:nth-child(2){width:5px;height:5px;bottom:150px;left:90px}.ink-s:nth-child(3){width:12px;height:10px;bottom:60px;right:120px;border-radius:60% 40% 50% 50%}.pc{position:absolute;bottom:0;right:0;width:40px;height:40px;background:linear-gradient(135deg,transparent 50%,#e8dcc6 50%,#ddd0b8 100%);z-index:3;border-radius:0 0 12px 0}.bl{position:relative;z-index:5;display:block;text-align:center;margin-top:16px;font-family:'Bad Script',cursive;font-size:0.95rem;color:#8a7a6a;text-decoration:none;transition:color 0.3s}.bl:hover{color:#3a2e28}.st,.ta,.end{animation:fadeIn 1.5s ease-out both}.ta{animation-delay:0.2s}.st{animation-delay:0.6s}.end{animation-delay:1.2s}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@media(max-width:520px){.nb{padding:40px 28px 50px 58px}.fr{width:140px;height:190px}.st{font-size:1.05rem;line-height:32px}.ta h1{font-size:1.5rem}.lang-sw{top:8px;right:8px}}

<script>
const T={
  ru:{title:"Маленький рыцарь",p1:"В одной небольшой деревне у подножия гор жил мальчик, который больше всего на свете хотел стать рыцарем. Он часто думал об этом и представлял, как однажды у него будет настоящий меч, доспехи и верный конь, и он будет защищать слабых и бороться со злом. Ему казалось, что рыцарем можно стать только в будущем, когда ты станешь сильным и взрослым.",p2:"Но пока у него был только деревянный меч, который он сам вырезал, и старый плащ, который он назвал своим рыцарским. Он выходил с ним на поле за деревней и тренировался, сражаясь с воображаемыми врагами. Иногда он уставал, падал в траву и просто лежал, смотря в небо, и думал, что он ещё недостаточно хороший для настоящих подвигов.",p3:"Однажды вечером, когда солнце уже почти спряталось за горами, он встретил на дороге старого путника. Тот сидел у дерева и отдыхал, будто шёл очень долго. Мальчик сначала немного постеснялся, но потом всё-таки начал рассказывать ему о своей мечте стать рыцарем, о подвигах и сражениях, которые он хочет совершить.",p4:"Старик слушал внимательно и не смеялся, не перебивал. А потом сказал, что рыцарем становится не тот, у кого есть меч, а тот, кто умеет быть смелым в обычной жизни. Кто не отворачивается, когда кому-то плохо, кто может помочь, даже если сам устал, и кто остаётся добрым, даже когда это трудно.",p5:"Мальчик сначала задумался. Ему казалось, что рыцарство — это что-то большое и громкое, как в сказках, а не простые вещи. Но потом он вспомнил, как однажды помог подняться упавшему ребёнку, как делился едой и как не прошёл мимо, когда кто-то плакал. И он понял, что, может быть, это тоже часть рыцарства, просто он раньше этого не замечал.",p6:"Когда путник ушёл, мальчик ещё долго сидел на земле. Ветер тихо шумел в траве, и впервые ему не нужно было представлять себя кем-то другим. Он просто чувствовал, что уже идёт по своей дороге, даже если она пока маленькая и незаметная.",p7:"И когда он вернулся домой, он заснул спокойно, без тревог и сомнений, потому что внутри него стало немного больше уверенности. Не громкой и яркой, а тихой, как огонь в ночи, который просто горит и не гаснет.",back:"← назад к тетради"},
  bg:{title:"Малкият рицар",p1:"В едно малко село в подножието на планината живееше момче, което повече от всичко на света искаше да стане рицар. Често мислеше за това и си представяше как един ден ще има истински меч, доспехи и верен кон и ще защитава слабите и ще се бори със злото. Струваше му се, че рицар може да станеш само в бъдещето, когато станеш силен и възрастен.",p2:"Но засега имаше само дървен меч, който сам беше издялал, и стар плащ, който нарече своя рицарски. Излизаше с него на полето зад селото и тренираше, борейки се с въображаеми врагове. Понякога се уморяваше, падаше в тревата и просто лежеше, гледайки небето, и мислеше, че още не е достатъчно добър за истински подвизи.",p3:"Една вечер, когато слънцето вече почти се беше скрило зад планините, срещна на пътя стар пътник. Той седеше до дърво и почиваше, сякаш беше вървял много дълго. Момчето отначало малко се притесни, но после все пак започна да му разказва за мечтата си да стане рицар, за подвизите и битките, които иска да извърши.",p4:"Старецът слушаше внимателно и не се смееше, не прекъсваше. А после каза, че рицар става не този, който има меч, а този, който умее да бъде смел в обикновения живот. Който не се отвръща, когато на някого му е зле, който може да помогне, дори когато самият той е уморен, и който остава добър, дори когато е трудно.",p5:"Момчето отначало се замисли. Струваше му се, че рицарството е нещо голямо и шумно, като в приказките, а не прости неща. Но после си спомни как веднъж помогна на паднало дете да стане, как споделяше храна и как не мина покрай някого, който плачеше. И разбра, че може би и това е част от рицарството, просто преди не го беше забелязвал.",p6:"Когато пътникът си тръгна, момчето още дълго седя на земята. Вятърът тихо шумеше в тревата и за пръв път не му трябваше да си представя някой друг. Просто усещаше, че вече върви по своя път, дори и той все още да е малък и незабележим.",p7:"И когато се върна вкъщи, заспа спокойно, без тревоги и съмнения, защото вътре в него стана малко повече увереност. Не шумна и ярка, а тиха, като огън в нощта, който просто гори и не угасва.",back:"← назад към тетрадката"},
  en:{title:"The Little Knight",p1:"In a small village at the foot of the mountains lived a boy who wanted to become a knight more than anything in the world. He often thought about it and imagined how one day he would have a real sword, armor, and a faithful horse, and he would protect the weak and fight evil. It seemed to him that you could only become a knight in the future, when you grew strong and grown-up.",p2:"But for now he only had a wooden sword he had carved himself, and an old cloak he called his knight's cape. He would go out to the field beyond the village and train, fighting imaginary enemies. Sometimes he got tired, fell into the grass, and just lay there looking at the sky, thinking he wasn't good enough yet for real heroic deeds.",p3:"One evening, when the sun had almost hidden behind the mountains, he met an old traveler on the road. The man sat by a tree, resting, as if he had walked a very long way. The boy felt a little shy at first, but then began telling him about his dream of becoming a knight, about the feats and battles he wanted to accomplish.",p4:"The old man listened carefully, never laughing, never interrupting. Then he said that a knight is not the one who has a sword, but the one who knows how to be brave in everyday life. The one who doesn't look away when someone is hurting, who can help even when he himself is tired, and who stays kind even when it's hard.",p5:"The boy thought about it. It had seemed to him that knighthood was something big and loud, like in fairy tales, not simple things. But then he remembered how he once helped a fallen child get up, how he shared his food, and how he didn't walk past someone who was crying. And he realized that maybe this was also part of being a knight — he just hadn't noticed it before.",p6:"When the traveler left, the boy sat on the ground for a long time. The wind rustled quietly in the grass, and for the first time he didn't need to imagine himself as someone else. He simply felt that he was already on his path, even if it was still small and unnoticeable.",p7:"And when he returned home, he fell asleep peacefully, without worries or doubts, because inside him there was a little more confidence. Not loud and bright, but quiet, like a fire in the night that simply burns and doesn't go out.",back:"← back to the notebook"},
  ua:{title:"Маленький лицар",p1:"В одному невеличкому селі біля підніжжя гір жив хлопчик, який найбільше на світі хотів стати лицарем. Він часто думав про це й уявляв, як одного дня матиме справжній меч, обладунки й вірного коня, і захищатиме слабких та боротиметься зі злом. Йому здавалося, що лицарем можна стати лише в майбутньому, коли станеш сильним і дорослим.",p2:"Але поки що в нього був лише дерев'яний меч, який він сам вирізав, і старий плащ, який назвав своїм лицарським. Він виходив із ним на поле за селом і тренувався, б'ючись із уявними ворогами. Іноді він втомлювався, падав у траву й просто лежав, дивлячись у небо, і думав, що ще недостатньо хороший для справжніх подвигів.",p3:"Одного вечора, коли сонце вже майже сховалося за горами, він зустрів на дорозі старого мандрівника. Той сидів біля дерева й відпочивав, ніби йшов дуже довго. Хлопчик спочатку трохи засоромився, але потім усе ж почав розповідати йому про свою мрію стати лицарем, про подвиги й битви, які хоче здійснити.",p4:"Старий слухав уважно, не сміявся, не перебивав. А потім сказав, що лицарем стає не той, у кого є меч, а той, хто вміє бути сміливим у звичайному житті. Хто не відвертається, коли комусь погано, хто може допомогти, навіть якщо сам втомився, і хто залишається добрим, навіть коли це важко.",p5:"Хлопчик спочатку замислився. Йому здавалося, що лицарство — це щось велике й гучне, як у казках, а не прості речі. Але потім він згадав, як одного разу допоміг піднятися дитині, що впала, як ділився їжею й як не пройшов повз, коли хтось плакав. І зрозумів, що, можливо, це теж частина лицарства, просто раніше він цього не помічав.",p6:"Коли мандрівник пішов, хлопчик ще довго сидів на землі. Вітер тихо шумів у траві, і вперше йому не потрібно було уявляти себе кимось іншим. Він просто відчував, що вже йде своєю дорогою, навіть якщо вона поки що маленька й непомітна.",p7:"І коли він повернувся додому, заснув спокійно, без тривог і сумнівів, бо всередині нього стало трохи більше впевненості. Не гучної й яскравої, а тихої, як вогонь уночі, який просто горить і не гасне.",back:"← назад до зошита"}
};
function getLang(){const h=location.hash.replace('#','');return['ru','bg','en','ua'].includes(h)?h:'ru'}
function setLang(l){location.hash=l==='ru'?'':l;document.querySelectorAll('[data-t]').forEach(e=>{const k=e.getAttribute('data-t');if(T[l]&&T[l][k])e.textContent=T[l][k]});document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));const bk=document.querySelector('.bl');if(bk)bk.href='../'+(l!=='ru'?'#'+l:'')}
setLang(getLang());
</script></body></html>
