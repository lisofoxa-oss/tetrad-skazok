  @import url('https://fonts.googleapis.com/css2?family=Bad+Script&family=Marck+Script&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1520;background-image:radial-gradient(ellipse at 20% 50%,rgba(80,50,90,0.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(40,50,100,0.25) 0%,transparent 50%);padding:40px 20px;font-family:'Bad Script',cursive}.lang-sw{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:4px;background:rgba(30,22,36,0.85);padding:4px;border-radius:8px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.4)}.lb{font-family:'Bad Script',cursive;font-size:0.85rem;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:#8a7a6a;transition:all 0.2s}.lb:hover{color:#e8dcc6}.lb.on{background:#e8dcc6;color:#1a1520}.nb{position:relative;max-width:660px;width:100%;background:#f5eed9;background-image:linear-gradient(rgba(0,0,0,0) 0px,rgba(0,0,0,0) 31px,#c9b99a44 31px,#c9b99a44 32px);background-size:100% 32px;border-radius:4px 12px 12px 4px;padding:48px 50px 60px 70px;box-shadow:-4px 0 0 #e8dcc6,-8px 0 0 #ddd0b8,0 8px 40px rgba(0,0,0,0.5),0 2px 10px rgba(0,0,0,0.3);overflow:hidden}.nb::before{content:'';position:absolute;left:54px;top:0;bottom:0;width:2px;background:rgba(200,80,80,0.3)}.nb::after{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,#ede4cc,#f2e9d2);border-right:1px solid rgba(0,0,0,0.05)}.holes{position:absolute;left:16px;top:0;bottom:0;z-index:2}.hole{width:16px;height:16px;background:#1a1520;border-radius:50%;position:absolute;left:0;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3)}.hole:nth-child(1){top:80px}.hole:nth-child(2){top:280px}.hole:nth-child(3){top:480px}.hole:nth-child(4){top:680px}.hole:nth-child(5){top:880px}.ta{text-align:center;margin-bottom:28px;position:relative;z-index:1}.ta h1{font-family:'Marck Script',cursive;font-size:2rem;color:#3a2e28;font-weight:400;letter-spacing:1px;position:relative;display:inline-block}.ta h1::after{content:'';position:absolute;bottom:-4px;left:-10%;width:120%;height:1px;background:linear-gradient(to right,transparent,#8a7a6a,transparent)}.st{position:relative;z-index:1;font-family:'Bad Script',cursive;font-size:1.25rem;line-height:32px;color:#2c2420;text-align:left}.st p{text-indent:2em;margin-bottom:0}.st p+p{margin-top:4px}.fl{float:left;width:200px;height:280px;margin:0 24px 10px -10px;shape-outside:ellipse(50% 48% at 50% 50%);position:relative}.fr{float:right;width:200px;height:280px;margin:0 -10px 10px 24px;shape-outside:ellipse(50% 48% at 50% 50%);position:relative}.fl img,.fr img{width:100%;height:100%;object-fit:contain}.dram{text-indent:0!important;text-align:center;font-size:1.3rem;color:#2a1e18;margin:8px 0}.reveal{text-indent:0!important;font-style:italic;color:#3a3228}.end{text-align:center;margin-top:20px;font-family:'Marck Script',cursive;font-size:1.1rem;color:#8a7a6a;letter-spacing:2px;position:relative;z-index:1}.end::before,.end::after{content:'~';margin:0 12px;opacity:0.5}.ink-s{position:absolute;border-radius:50%;background:rgba(30,25,40,0.06);z-index:1;pointer-events:none}.ink-s:nth-child(1){width:8px;height:8px;top:120px;right:80px}.ink-s:nth-child(2){width:5px;height:5px;bottom:150px;left:90px}.ink-s:nth-child(3){width:12px;height:10px;bottom:60px;right:120px;border-radius:60% 40% 50% 50%}.pc{position:absolute;bottom:0;right:0;width:40px;height:40px;background:linear-gradient(135deg,transparent 50%,#e8dcc6 50%,#ddd0b8 100%);z-index:3;border-radius:0 0 12px 0}.bl{position:relative;z-index:5;display:block;text-align:center;margin-top:16px;font-family:'Bad Script',cursive;font-size:0.95rem;color:#8a7a6a;text-decoration:none;transition:color 0.3s}.bl:hover{color:#3a2e28}.st,.ta,.end{animation:fadeIn 1.5s ease-out both}.ta{animation-delay:0.2s}.st{animation-delay:0.6s}.end{animation-delay:1.2s}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@media(max-width:520px){.nb{padding:40px 28px 50px 58px}.fl,.fr{width:140px;height:200px}.st{font-size:1.05rem;line-height:32px}.ta h1{font-size:1.5rem}.lang-sw{top:8px;right:8px}}
</style></head><body>

<script>
const T={
  ru:{title:"Две пары глаз",p1:"В тёмном лесу жил странный кот с большими пустыми глазами. Он сидел среди деревьев и почти не двигался. Только хвост медленно шуршал по сухим листьям.",p2:"Но в этом лесу был не только он. Недалеко от него бродила худая, странная собака. У неё были длинные уши и кривой хвост. Она почти не лаяла — только тихо рычала в темноте.",p3:"Люди в деревне говорили: если ночью в лесу сначала увидишь кота — беги. А если сначала услышишь тихое рычание собаки — уже поздно.",p4:"Однажды человек пошёл через лес ночью. Вдруг он увидел на дороге кота с огромными глазами. Кот просто сидел и смотрел.",p5:"Человек испугался и сделал шаг назад. В этот момент за его спиной раздалось тихое рычание.",p6:"Он медленно обернулся... и увидел собаку. Она стояла совсем близко и смотрела на него так же пусто, как кот. Человек снова посмотрел на дорогу — но кот уже подошёл ближе.",d1:"Собака сделала шаг.",d2:"Кот сделал шаг.",p7:"И тогда человек понял:",r1:"Кот смотрит спереди, чтобы ты не видел собаку.",r2:"А собака стоит сзади, чтобы ты не убежал от кота.",p8:"С тех пор ночью в лесу иногда видят две пары глаз... одни впереди, а другие — прямо за спиной.",back:"← назад к тетради"},
  bg:{title:"Две двойки очи",p1:"В тъмната гора живееше странна котка с големи празни очи. Седеше сред дърветата и почти не помръдваше. Само опашката бавно шумолеше по сухите листа.",p2:"Но в тази гора не беше само тя. Наблизо скиташе мършаво, странно куче. Имаше дълги уши и крива опашка. Почти не лаеше — само тихо ръмжеше в тъмното.",p3:"Хората в селото казваха: ако нощем в гората първо видиш котката — бягай. А ако първо чуеш тихото ръмжене на кучето — вече е късно.",p4:"Веднъж човек тръгна през гората нощем. Изведнъж видя на пътя котка с огромни очи. Котката просто седеше и гледаше.",p5:"Човекът се изплаши и направи крачка назад. В този момент зад гърба му се чу тихо ръмжене.",p6:"Бавно се обърна... и видя кучето. Стоеше съвсем близо и го гледаше също толкова празно, колкото котката. Човекът отново погледна към пътя — но котката вече беше по-близо.",d1:"Кучето направи крачка.",d2:"Котката направи крачка.",p7:"И тогава човекът разбра:",r1:"Котката гледа отпред, за да не видиш кучето.",r2:"А кучето стои отзад, за да не избягаш от котката.",p8:"Оттогава нощем в гората понякога виждат две двойки очи... едните отпред, а другите — точно зад гърба.",back:"← назад към тетрадката"},
  en:{title:"Two Pairs of Eyes",p1:"In a dark forest lived a strange cat with big empty eyes. It sat among the trees and barely moved. Only its tail rustled slowly through the dry leaves.",p2:"But it wasn't alone in that forest. Not far away roamed a thin, strange dog. It had long ears and a crooked tail. It barely barked — it only growled softly in the dark.",p3:"People in the village said: if at night in the forest you see the cat first — run. But if you hear the dog's quiet growl first — it's already too late.",p4:"One night a man walked through the forest. Suddenly he saw a cat on the road with enormous eyes. The cat just sat there, watching.",p5:"The man got scared and took a step back. At that moment behind him came a quiet growl.",p6:"He slowly turned around... and saw the dog. It stood very close, staring at him just as emptily as the cat. The man looked back at the road — but the cat had already come closer.",d1:"The dog took a step.",d2:"The cat took a step.",p7:"And then the man understood:",r1:"The cat watches from the front so you don't see the dog.",r2:"And the dog stands behind so you can't run from the cat.",p8:"Since then, at night in the forest, people sometimes see two pairs of eyes... one pair ahead, and the other — right behind your back.",back:"← back to the notebook"}
};
function getLang(){const h=location.hash.replace('#','');return['ru','bg','en'].includes(h)?h:'ru'}
function setLang(l){location.hash=l==='ru'?'':l;document.querySelectorAll('[data-t]').forEach(e=>{const k=e.getAttribute('data-t');if(T[l]&&T[l][k])e.textContent=T[l][k]});document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));const bk=document.querySelector('.bl');if(bk)bk.href='../'+(l!=='ru'?'#'+l:'')}
setLang(getLang());
</script></body></html>
