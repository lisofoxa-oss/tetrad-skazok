<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Cpath d=%27M26 2c-4 3-8 8-10 14l-2 6 1 1c2-1 4-2 6-2C27 15 31 9 30 4c0-1-1-2-2-2h-2z%27 fill=%27%233a2e28%27 opacity=%270.9%27/%3E%3Cpath d=%27M14 22l-2 6c0 1 0 2 1 2s2-1 2-1l1-5-2-2z%27 fill=%27%233a2e28%27/%3E%3Ccircle cx=%278%27 cy=%2728%27 r=%273%27 fill=%27%231a1520%27 opacity=%270.7%27/%3E%3Cellipse cx=%278%27 cy=%2727%27 rx=%273%27 ry=%271.5%27 fill=%27%232c2420%27/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Существо из тетради</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bad+Script&family=Marck+Script&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1520;background-image:radial-gradient(ellipse at 20% 50%,rgba(80,50,90,0.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(40,50,100,0.25) 0%,transparent 50%);padding:40px 20px;font-family:'Bad Script',cursive}
  .lang-sw{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:4px;background:rgba(30,22,36,0.85);padding:4px;border-radius:8px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.4)}
  .lb{font-family:'Bad Script',cursive;font-size:0.85rem;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:#8a7a6a;transition:all 0.2s}.lb:hover{color:#e8dcc6}.lb.on{background:#e8dcc6;color:#1a1520}
  .nb{position:relative;max-width:660px;width:100%;background:#f5eed9;background-image:linear-gradient(rgba(0,0,0,0) 0px,rgba(0,0,0,0) 31px,#c9b99a44 31px,#c9b99a44 32px);background-size:100% 32px;border-radius:4px 12px 12px 4px;padding:48px 50px 60px 70px;box-shadow:-4px 0 0 #e8dcc6,-8px 0 0 #ddd0b8,0 8px 40px rgba(0,0,0,0.5),0 2px 10px rgba(0,0,0,0.3);overflow:hidden}
  .nb::before{content:'';position:absolute;left:54px;top:0;bottom:0;width:2px;background:rgba(200,80,80,0.3)}
  .nb::after{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,#ede4cc,#f2e9d2);border-right:1px solid rgba(0,0,0,0.05)}
  .holes{position:absolute;left:16px;top:0;bottom:0;z-index:2}
  .hole{width:16px;height:16px;background:#1a1520;border-radius:50%;position:absolute;left:0;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3)}
  .hole:nth-child(1){top:80px}.hole:nth-child(2){top:280px}.hole:nth-child(3){top:480px}.hole:nth-child(4){top:680px}
  .ta{text-align:center;margin-bottom:28px;position:relative;z-index:1}
  .ta h1{font-family:'Marck Script',cursive;font-size:2rem;color:#3a2e28;font-weight:400;letter-spacing:1px;position:relative;display:inline-block}
  .ta h1::after{content:'';position:absolute;bottom:-4px;left:-10%;width:120%;height:1px;background:linear-gradient(to right,transparent,#8a7a6a,transparent)}
  .st{position:relative;z-index:1;font-family:'Bad Script',cursive;font-size:1.25rem;line-height:32px;color:#2c2420;text-align:left}
  .st p{text-indent:2em;margin-bottom:0}.st p+p{margin-top:4px}
  .fr{float:right;width:240px;height:340px;margin:0 -10px 10px 24px;shape-outside:ellipse(50% 48% at 50% 50%);position:relative}
  .fr img{width:100%;height:100%;object-fit:contain}
  .end{text-align:center;margin-top:20px;font-family:'Marck Script',cursive;font-size:1.1rem;color:#8a7a6a;letter-spacing:2px;position:relative;z-index:1}.end::before,.end::after{content:'~';margin:0 12px;opacity:0.5}
  .ink-s{position:absolute;border-radius:50%;background:rgba(30,25,40,0.06);z-index:1;pointer-events:none}.ink-s:nth-child(1){width:8px;height:8px;top:120px;right:80px}.ink-s:nth-child(2){width:5px;height:5px;bottom:150px;left:90px}.ink-s:nth-child(3){width:12px;height:10px;bottom:60px;right:120px;border-radius:60% 40% 50% 50%}
  .pc{position:absolute;bottom:0;right:0;width:40px;height:40px;background:linear-gradient(135deg,transparent 50%,#e8dcc6 50%,#ddd0b8 100%);z-index:3;border-radius:0 0 12px 0}
  .bl{position:relative;z-index:5;display:block;text-align:center;margin-top:16px;font-family:'Bad Script',cursive;font-size:0.95rem;color:#8a7a6a;text-decoration:none;transition:color 0.3s}.bl:hover{color:#3a2e28}
  .st,.ta,.end{animation:fadeIn 1.5s ease-out both}.ta{animation-delay:0.2s}.st{animation-delay:0.6s}.end{animation-delay:1.2s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:520px){.nb{padding:40px 28px 50px 58px}.fr{width:160px;height:230px}.st{font-size:1.05rem;line-height:32px}.ta h1{font-size:1.5rem}.lang-sw{top:8px;right:8px}}
</style>
</head>
<body>
<div class="lang-sw"><button class="lb on" onclick="setLang('ru')">RU</button><button class="lb" onclick="setLang('bg')">BG</button><button class="lb" onclick="setLang('en')">EN</button><button class="lb" onclick="setLang('ua')">UA</button></div>
<div class="nb">
  <div class="holes"><div class="hole"></div><div class="hole"></div><div class="hole"></div><div class="hole"></div></div>
  <div class="ink-s"></div><div class="ink-s"></div><div class="ink-s"></div>
  <div class="ta"><h1 data-t="title"></h1></div>
  <div class="st">
    <div class="fr"><img src="creature.png" alt=""></div>
    <p data-t="p1"></p><p data-t="p2"></p><p data-t="p3"></p>
  </div>
  <div class="end">✿</div>
  <div class="pc"></div>
  <a href="../" class="bl" data-t="back"></a>
</div>
<script>
const T={
  ru:{title:"Существо из тетради",p1:"В тетради, между строчек, жило маленькое крылатое существо с хвостом, как у кометы. Днём оно притворялось кляксой, а ночью расправляло тонкие крылья и вылетало из бумаги.",p2:"Однажды оно услышало, как человек вздыхает над пустой страницей — не было ни идей, ни слов. Существо тихо коснулось пера, и строчки сами собой наполнились сказками и смелыми мыслями.",p3:"С тех пор, если долго смотреть на чистый лист и не бояться темноты, можно заметить, как между строк шевелятся крылья — значит, вдохновение рядом.",back:"← назад к тетради"},
  bg:{title:"Съществото от тетрадката",p1:"В тетрадката, между редовете, живееше малко крилато същество с опашка като на комета. През деня се преструваше на мастилено петно, а през нощта разперваше тънки крила и излиташе от хартията.",p2:"Веднъж то чу как човек въздиша над празна страница — нямаше нито идеи, нито думи. Съществото тихо докосна перото и редовете сами се изпълниха с приказки и смели мисли.",p3:"Оттогава, ако гледаш дълго празен лист и не се боиш от тъмнината, можеш да забележиш как между редовете се раздвижват крила — значи вдъхновението е наблизо.",back:"← назад към тетрадката"},
  ua:{title:"Істота із зошита",p1:"У зошиті, між рядків, жила маленька крилата істота з хвостом, як у комети. Вдень вона прикидалася плямою від чорнила, а вночі розправляла тонкі крила і вилітала з паперу.",p2:"Одного разу вона почула, як людина зітхає над порожньою сторінкою — не було ні ідей, ні слів. Істота тихо торкнулася пера, і рядки самі собою наповнилися казками та сміливими думками.",p3:"Відтоді, якщо довго дивитися на чистий аркуш і не боятися темряви, можна помітити, як між рядків ворушаться крила — значить, натхнення поруч.",back:"← назад до зошита"},
  en:{title:"The Notebook Creature",p1:"In a notebook, between the lines, there lived a tiny winged creature with a tail like a comet. By day it pretended to be an ink blot, and by night it spread its thin wings and flew out of the paper.",p2:"One day it heard a person sighing over an empty page — there were no ideas, no words. The creature quietly touched the pen, and the lines filled themselves with fairy tales and bold thoughts.",p3:"Since then, if you stare at a blank page long enough and don't fear the darkness, you can notice wings stirring between the lines — it means inspiration is near.",back:"← back to the notebook"}
};
function getLang(){const h=location.hash.replace('#','');return['ru','bg','en','ua'].includes(h)?h:'ru'}
function setLang(l){location.hash=l==='ru'?'':l;document.querySelectorAll('[data-t]').forEach(e=>{const k=e.getAttribute('data-t');if(T[l]&&T[l][k])e.textContent=T[l][k]});document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));const bk=document.querySelector('.bl');if(bk)bk.href='../'+(l!=='ru'?'#'+l:'')}
setLang(getLang());
</script>
</body>
</html>
