<title>Маленький странный цирк</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bad+Script&family=Marck+Script&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1520;background-image:radial-gradient(ellipse at 20% 50%,rgba(80,50,90,0.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(40,50,100,0.25) 0%,transparent 50%);padding:40px 20px;font-family:'Bad Script',cursive}.lang-sw{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:4px;background:rgba(30,22,36,0.85);padding:4px;border-radius:8px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.4)}.lb{font-family:'Bad Script',cursive;font-size:0.85rem;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:#8a7a6a;transition:all 0.2s}.lb:hover{color:#e8dcc6}.lb.on{background:#e8dcc6;color:#1a1520}.nb{position:relative;max-width:660px;width:100%;background:#f5eed9;background-image:linear-gradient(rgba(0,0,0,0) 0px,rgba(0,0,0,0) 31px,#c9b99a44 31px,#c9b99a44 32px);background-size:100% 32px;border-radius:4px 12px 12px 4px;padding:48px 50px 60px 70px;box-shadow:-4px 0 0 #e8dcc6,-8px 0 0 #ddd0b8,0 8px 40px rgba(0,0,0,0.5),0 2px 10px rgba(0,0,0,0.3);overflow:hidden}.nb::before{content:'';position:absolute;left:54px;top:0;bottom:0;width:2px;background:rgba(200,80,80,0.3)}.nb::after{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,#ede4cc,#f2e9d2);border-right:1px solid rgba(0,0,0,0.05)}.holes{position:absolute;left:16px;top:0;bottom:0;z-index:2}.hole{width:16px;height:16px;background:#1a1520;border-radius:50%;position:absolute;left:0;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3)}.hole:nth-child(1){top:80px}.hole:nth-child(2){top:280px}.hole:nth-child(3){top:480px}.hole:nth-child(4){top:680px}.ta{text-align:center;margin-bottom:28px;position:relative;z-index:1}.ta h1{font-family:'Marck Script',cursive;font-size:2rem;color:#3a2e28;font-weight:400;letter-spacing:1px;position:relative;display:inline-block}.ta h1::after{content:'';position:absolute;bottom:-4px;left:-10%;width:120%;height:1px;background:linear-gradient(to right,transparent,#8a7a6a,transparent)}.st{position:relative;z-index:1;font-family:'Bad Script',cursive;font-size:1.25rem;line-height:32px;color:#2c2420;text-align:left}.st p{text-indent:2em;margin-bottom:0}.st p+p{margin-top:4px}.fl{float:left;width:200px;height:220px;margin:0 24px 10px -10px;shape-outside:ellipse(50% 48% at 50% 50%);position:relative}.fr{float:right;width:200px;height:220px;margin:0 -10px 10px 24px;shape-outside:ellipse(50% 48% at 50% 50%);position:relative}.fl img,.fr img{width:100%;height:100%;object-fit:contain}.dial{text-indent:0!important;padding-left:1em;font-style:italic;color:#3a3228}.end{text-align:center;margin-top:20px;font-family:'Marck Script',cursive;font-size:1.1rem;color:#8a7a6a;letter-spacing:2px;position:relative;z-index:1}.end::before,.end::after{content:'~';margin:0 12px;opacity:0.5}.ink-s{position:absolute;border-radius:50%;background:rgba(30,25,40,0.06);z-index:1;pointer-events:none}.ink-s:nth-child(1){width:8px;height:8px;top:120px;right:80px}.ink-s:nth-child(2){width:5px;height:5px;bottom:150px;left:90px}.ink-s:nth-child(3){width:12px;height:10px;bottom:60px;right:120px;border-radius:60% 40% 50% 50%}.pc{position:absolute;bottom:0;right:0;width:40px;height:40px;background:linear-gradient(135deg,transparent 50%,#e8dcc6 50%,#ddd0b8 100%);z-index:3;border-radius:0 0 12px 0}.bl{position:relative;z-index:5;display:block;text-align:center;margin-top:16px;font-family:'Bad Script',cursive;font-size:0.95rem;color:#8a7a6a;text-decoration:none;transition:color 0.3s}.bl:hover{color:#3a2e28}.st,.ta,.end{animation:fadeIn 1.5s ease-out both}.ta{animation-delay:0.2s}.st{animation-delay:0.6s}.end{animation-delay:1.2s}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@media(max-width:520px){.nb{padding:40px 28px 50px 58px}.fl,.fr{width:140px;height:160px}.st{font-size:1.05rem;line-height:32px}.ta h1{font-size:1.5rem}.lang-sw{top:8px;right:8px}}
</style></head><body>

<div class="nb"><div class="holes"><div class="hole"></div><div class="hole"></div><div class="hole"></div><div class="hole"></div></div><div class="ink-s"></div><div class="ink-s"></div><div class="ink-s"></div>

<script>
const T={
  ru:{title:"Маленький странный цирк",p1:"Пухелик Искристый и Раккун Бон-Бон были странствующими циркачами. У них не было большого цирка и огромного шатра, только маленькая тележка с реквизитом и смешная шапочка, которую Раккун всегда надевал перед выступлением.",p2:"Пухелик обычно сидел у него на голове и следил за номером. Он был маленький, пушистый и иногда умел делать крошечные искры, из-за которых зрителям казалось, что в цирке есть немного магии.",p3:"Раккун Бон-Бон считал себя великим артистом. Перед каждым выступлением он громко объявлял:",d1:"— Сейчас будет самый невероятный трюк!",p4:"Потом он разбегался, пытался сделать красивый прыжок... и часто приземлялся совсем не так, как планировал. Иногда прямо в коробку с реквизитом. Пухелик в такие моменты быстро выпускал искры и делал вид, что так и должно было быть. Люди смеялись, хлопали и говорили, что это было очень смешное выступление.",p5:"А когда всё заканчивалось, они собирали свои вещи и шли дальше по дороге искать новый город и новых зрителей.",p6:"Потому что где бы ни появились Пухелик Искристый и Раккун Бон-Бон, там всегда начинался маленький и немного странный цирк.",back:"← назад к тетради"},
  bg:{title:"Малкият странен цирк",p1:"Пухелик Искристият и Раккун Бон-Бон бяха пътуващи циркаджии. Нямаха голям цирк и огромна шатра, само малка количка с реквизит и смешна шапчица, която Раккун винаги слагаше преди представлението.",p2:"Пухелик обикновено седеше на главата му и следеше номера. Беше малък, пухкав и понякога умееше да прави мънички искрици, заради които на зрителите им се струваше, че в цирка има малко магия.",p3:"Раккун Бон-Бон се смяташе за велик артист. Преди всяко представление той високо обявяваше:",d1:"— Сега ще видите най-невероятния трик!",p4:"После се затичваше, опитваше се да направи красив скок... и често се приземяваше съвсем не както беше планирал. Понякога направо в кутията с реквизита. Пухелик в такива моменти бързо изпускаше искри и правеше вид, че така трябва да бъде. Хората се смееха, ръкопляскаха и казваха, че е било много смешно представление.",p5:"А когато всичко свършваше, те събираха нещата си и тръгваха нататък по пътя да търсят нов град и нови зрители.",p6:"Защото където и да се появяха Пухелик Искристият и Раккун Бон-Бон, там винаги започваше малък и малко странен цирк.",back:"← назад към тетрадката"},
  en:{title:"The Little Strange Circus",p1:"Puhelik the Sparky and Raccoon Bon-Bon were traveling circus performers. They had no big circus tent or grand arena, just a small cart of props and a funny hat that Raccoon always put on before a show.",p2:"Puhelik usually sat on top of his head and watched the act. He was small, fluffy, and sometimes could make tiny sparks, which made the audience believe there was a little magic in the circus.",p3:"Raccoon Bon-Bon considered himself a great artist. Before every show he would loudly announce:",d1:"— Now you will see the most incredible trick!",p4:"Then he would run up, try to make a beautiful leap... and often land nothing like he had planned. Sometimes right into the prop box. In those moments Puhelik would quickly shoot out sparks and act as if that was exactly how it was supposed to be. People laughed, clapped, and said it was a very funny show.",p5:"And when it was all over, they packed up their things and walked on down the road, looking for a new town and new spectators.",p6:"Because wherever Puhelik the Sparky and Raccoon Bon-Bon appeared, a little and slightly strange circus always began.",back:"← back to the notebook"},
  ua:{title:"Маленький дивний цирк",p1:"Пухелик Іскристий та Ракун Бон-Бон були мандрівними циркачами. У них не було великого цирку й величезного шатра, лише маленький візок із реквізитом і кумедна шапочка, яку Ракун завжди надягав перед виступом.",p2:"Пухелик зазвичай сидів у нього на голові й стежив за номером. Він був маленький, пухнастий і іноді вмів робити крихітні іскорки, через які глядачам здавалося, що в цирку є трішки магії.",p3:"Ракун Бон-Бон вважав себе великим артистом. Перед кожним виступом він голосно оголошував:",d1:"— Зараз буде найнеймовірніший трюк!",p4:"Потім він розбігався, намагався зробити гарний стрибок... і часто приземлявся зовсім не так, як планував. Іноді прямо в коробку з реквізитом. Пухелик у такі моменти швидко випускав іскри й робив вигляд, що так і мало бути. Люди сміялися, плескали в долоні й казали, що це був дуже смішний виступ.",p5:"А коли все закінчувалося, вони збирали свої речі й ішли далі дорогою шукати нове місто й нових глядачів.",p6:"Бо де б не з'явилися Пухелик Іскристий та Ракун Бон-Бон, там завжди починався маленький і трішки дивний цирк.",back:"← назад до зошита"}
};
function getLang(){const h=location.hash.replace('#','');return['ru','bg','en','ua'].includes(h)?h:'ru'}
function setLang(l){location.hash=l==='ru'?'':l;document.querySelectorAll('[data-t]').forEach(e=>{const k=e.getAttribute('data-t');if(T[l]&&T[l][k])e.textContent=T[l][k]});document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));const bk=document.querySelector('.bl');if(bk)bk.href='../'+(l!=='ru'?'#'+l:'')}
setLang(getLang());
</script></body></html>
