<style>
  @import url('https://fonts.googleapis.com/css2?family=Bad+Script&family=Marck+Script&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1520;background-image:radial-gradient(ellipse at 20% 50%,rgba(80,50,90,0.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(40,50,100,0.25) 0%,transparent 50%);padding:40px 20px;font-family:'Bad Script',cursive}.lang-sw{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:4px;background:rgba(30,22,36,0.85);padding:4px;border-radius:8px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.4)}.lb{font-family:'Bad Script',cursive;font-size:0.85rem;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:#8a7a6a;transition:all 0.2s}.lb:hover{color:#e8dcc6}.lb.on{background:#e8dcc6;color:#1a1520}.nb{position:relative;max-width:660px;width:100%;background:#f5eed9;background-image:linear-gradient(rgba(0,0,0,0) 0px,rgba(0,0,0,0) 31px,#c9b99a44 31px,#c9b99a44 32px);background-size:100% 32px;border-radius:4px 12px 12px 4px;padding:48px 50px 60px 70px;box-shadow:-4px 0 0 #e8dcc6,-8px 0 0 #ddd0b8,0 8px 40px rgba(0,0,0,0.5),0 2px 10px rgba(0,0,0,0.3);overflow:hidden}.nb::before{content:'';position:absolute;left:54px;top:0;bottom:0;width:2px;background:rgba(200,80,80,0.3)}.nb::after{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,#ede4cc,#f2e9d2);border-right:1px solid rgba(0,0,0,0.05)}.holes{position:absolute;left:16px;top:0;bottom:0;z-index:2}.hole{width:16px;height:16px;background:#1a1520;border-radius:50%;position:absolute;left:0;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3)}.hole:nth-child(1){top:80px}.hole:nth-child(2){top:280px}.hole:nth-child(3){top:480px}.hole:nth-child(4){top:680px}.ta{text-align:center;margin-bottom:28px;position:relative;z-index:1}.ta h1{font-family:'Marck Script',cursive;font-size:2rem;color:#3a2e28;font-weight:400;letter-spacing:1px;position:relative;display:inline-block}.ta h1::after{content:'';position:absolute;bottom:-4px;left:-10%;width:120%;height:1px;background:linear-gradient(to right,transparent,#8a7a6a,transparent)}.st{position:relative;z-index:1;font-family:'Bad Script',cursive;font-size:1.25rem;line-height:32px;color:#2c2420;text-align:left}.st p{text-indent:2em;margin-bottom:0}.st p+p{margin-top:4px}.fr{float:right;width:200px;height:240px;margin:0 -10px 10px 24px;shape-outside:ellipse(50% 48% at 50% 50%);position:relative}.fl{float:left;width:200px;height:220px;margin:0 24px 10px -10px;shape-outside:ellipse(50% 48% at 50% 50%);position:relative}.fr img,.fl img{width:100%;height:100%;object-fit:contain}.fc{width:200px;height:180px;margin:16px auto 0;position:relative;clear:both}.fc img{width:100%;height:100%;object-fit:contain}.dial{text-indent:0!important;padding-left:1em;font-style:italic;color:#3a3228}.end{text-align:center;margin-top:20px;font-family:'Marck Script',cursive;font-size:1.1rem;color:#8a7a6a;letter-spacing:2px;position:relative;z-index:1}.end::before,.end::after{content:'~';margin:0 12px;opacity:0.5}.ink-s{position:absolute;border-radius:50%;background:rgba(30,25,40,0.06);z-index:1;pointer-events:none}.ink-s:nth-child(1){width:8px;height:8px;top:120px;right:80px}.ink-s:nth-child(2){width:5px;height:5px;bottom:150px;left:90px}.ink-s:nth-child(3){width:12px;height:10px;bottom:60px;right:120px;border-radius:60% 40% 50% 50%}.pc{position:absolute;bottom:0;right:0;width:40px;height:40px;background:linear-gradient(135deg,transparent 50%,#e8dcc6 50%,#ddd0b8 100%);z-index:3;border-radius:0 0 12px 0}.bl{position:relative;z-index:5;display:block;text-align:center;margin-top:16px;font-family:'Bad Script',cursive;font-size:0.95rem;color:#8a7a6a;text-decoration:none;transition:color 0.3s}.bl:hover{color:#3a2e28}.st,.ta,.end{animation:fadeIn 1.5s ease-out both}.ta{animation-delay:0.2s}.st{animation-delay:0.6s}.end{animation-delay:1.2s}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@media(max-width:520px){ <script>
const T={
  ru:{title:"Бум",p1:"Жил-был зверёк по имени Бум. Он был кругленький и пухленький, пушистый и частично неуклюжий — всё, что он делал, заканчивалось «бум». Однажды он решил:",d1:"— Всё! С этого дня я буду... другим, настоящим, уверенным.",p2:"Он поднял лапки, сделал серьёзное лицо и шагнул вперёд... но тут же запутался в собственном хвосте — и бум в траву. Из рядом сидящего цветка раздался тихий смешок.",d2:"— Ты чего такой сердитый?",p3:"Бум вздохнул:",d3:"— Потому что у меня ничего не получается нормально.",d4:"Цветок покачался на ветру и сказал: — А зачем тебе «нормально»? Ты и так интересный.",p4:"Бум задумался. Потом осторожно встал... и вдруг специально перекатился — бум. Он замер. А потом засмеялся.",p5:"С тех пор Бум больше не пытался быть идеальным. Он просто жил, падал, катился и смеялся вместе с этим миром.",back:"← назад к тетради"},
  bg:{title:"Бум",p1:"Живяло едно зверче на име Бум. Беше кръглничко и пухкаво, пухкаво и отчасти тромаво — всичко, което правеше, свършваше с «бум». Един ден реши:",d1:"— Стига! От днес ще бъда... различен, истински, уверен.",p2:"Вдигна лапички, направи сериозно лице и пристъпи напред... но веднага се заплете в собствената си опашка — и бум в тревата. От цветето наблизо се чу тих смях.",d2:"— Защо си толкова сърдит?",p3:"Бум въздъхна:",d3:"— Защото нищо не ми се получава нормално.",d4:"Цветето се поклати на вятъра и каза: — А защо ти трябва «нормално»? Ти и така си интересен.",p4:"Бум се замисли. После предпазливо стана... и изведнъж нарочно се претърколи — бум. Замръзна. А после се засмя.",p5:"Оттогава Бум вече не се опитваше да бъде идеален. Просто живееше, падаше, търкаляше се и се смееше заедно с този свят.",back:"← назад към тетрадката"},
  en:{title:"Boom",p1:"Once there was a little creature named Boom. He was round and chubby, fluffy and partly clumsy — everything he did ended with 'boom.' One day he decided:",d1:"— That's it! From today I will be... different, real, confident.",p2:"He raised his paws, put on a serious face and stepped forward... but immediately tripped over his own tail — and boom into the grass. From a flower sitting nearby came a quiet giggle.",d2:"— Why are you so grumpy?",p3:"Boom sighed:",d3:"— Because nothing I do turns out right.",d4:"The flower swayed in the wind and said: — Why do you need 'right'? You're interesting just as you are.",p4:"Boom thought about it. Then carefully stood up... and suddenly rolled over on purpose — boom. He froze. And then he laughed.",p5:"From then on, Boom stopped trying to be perfect. He just lived, fell, rolled, and laughed along with the world.",back:"← back to the notebook"},
  ua:{title:"Бум",p1:"Жив-був звірятко на ім'я Бум. Він був кругленький і пухкенький, пухнастий і частково незграбний — все, що він робив, закінчувалося «бум». Одного дня він вирішив:",d1:"— Все! Відсьогодні я буду... іншим, справжнім, впевненим.",p2:"Він підняв лапки, зробив серйозне обличчя й крокнув вперед... але одразу заплутався у власному хвості — і бум у траву. З квітки, що сиділа поруч, пролунав тихий сміх.",d2:"— Ти чого такий сердитий?",p3:"Бум зітхнув:",d3:"— Бо в мене нічого не виходить нормально.",d4:"Квітка погойдалася на вітрі й сказала: — А навіщо тобі «нормально»? Ти й так цікавий.",p4:"Бум задумався. Потім обережно встав... і раптом спеціально перекотився — бум. Він завмер. А потім засміявся.",p5:"Відтоді Бум більше не намагався бути ідеальним. Він просто жив, падав, котився й сміявся разом із цим світом.",back:"← назад до зошита"}
};
function getLang(){const h=location.hash.replace('#','');return['ru','bg','en','ua'].includes(h)?h:'ru'}
function setLang(l){location.hash=l==='ru'?'':l;document.querySelectorAll('[data-t]').forEach(e=>{const k=e.getAttribute('data-t');if(T[l]&&T[l][k])e.textContent=T[l][k]});document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));const bk=document.querySelector('.bl');if(bk)bk.href='../'+(l!=='ru'?'#'+l:'')}
setLang(getLang());
</script></body></html>
