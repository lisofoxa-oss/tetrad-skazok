  @import url('https://fonts.googleapis.com/css2?family=Bad+Script&family=Marck+Script&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1520;background-image:radial-gradient(ellipse at 20% 50%,rgba(80,50,90,0.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(40,50,100,0.25) 0%,transparent 50%);padding:40px 20px;font-family:'Bad Script',cursive}.lang-sw{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:4px;background:rgba(30,22,36,0.85);padding:4px;border-radius:8px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.4)}.lb{font-family:'Bad Script',cursive;font-size:0.85rem;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:#8a7a6a;transition:all 0.2s}.lb:hover{color:#e8dcc6}.lb.on{background:#e8dcc6;color:#1a1520}.nb{position:relative;max-width:660px;width:100%;background:#f5eed9;background-image:linear-gradient(rgba(0,0,0,0) 0px,rgba(0,0,0,0) 31px,#c9b99a44 31px,#c9b99a44 32px);background-size:100% 32px;border-radius:4px 12px 12px 4px;padding:48px 50px 60px 70px;box-shadow:-4px 0 0 #e8dcc6,-8px 0 0 #ddd0b8,0 8px 40px rgba(0,0,0,0.5),0 2px 10px rgba(0,0,0,0.3);overflow:hidden}.nb::before{content:'';position:absolute;left:54px;top:0;bottom:0;width:2px;background:rgba(200,80,80,0.3)}.nb::after{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,#ede4cc,#f2e9d2);border-right:1px solid rgba(0,0,0,0.05)}.holes{position:absolute;left:16px;top:0;bottom:0;z-index:2}.hole{width:16px;height:16px;background:#1a1520;border-radius:50%;position:absolute;left:0;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3)}.hole:nth-child(1){top:80px}.hole:nth-child(2){top:280px}.hole:nth-child(3){top:480px}.hole:nth-child(4){top:680px}.ta{text-align:center;margin-bottom:28px;position:relative;z-index:1}.bb{display:block;width:fit-content;margin:0 auto 8px;background:#8b4560;color:#f5eed9;font-family:'Bad Script',cursive;font-size:0.75rem;padding:2px 10px;border-radius:8px;margin-bottom:8px;position:relative;z-index:1}.ta h1{font-family:'Marck Script',cursive;font-size:2rem;color:#3a2e28;font-weight:400;letter-spacing:1px;position:relative;display:inline-block}.ta h1::after{content:'';position:absolute;bottom:-4px;left:-10%;width:120%;height:1px;background:linear-gradient(to right,transparent,#8a7a6a,transparent)}.st{position:relative;z-index:1;font-family:'Bad Script',cursive;font-size:1.25rem;line-height:32px;color:#2c2420;text-align:left}.st p{text-indent:2em;margin-bottom:0}.st p+p{margin-top:4px}.fr{float:right;width:260px;height:180px;margin:0 -10px 10px 24px;shape-outside:ellipse(50% 48% at 50% 50%);position:relative}.fr img{width:100%;height:100%;object-fit:contain}.warm{text-indent:0!important;text-align:center;font-size:1.15rem;color:#6a3a3a;margin:10px 0;font-style:italic}.end{text-align:center;margin-top:20px;font-family:'Marck Script',cursive;font-size:1.1rem;color:#8a7a6a;letter-spacing:2px;position:relative;z-index:1}.end::before,.end::after{content:'~';margin:0 12px;opacity:0.5}.ink-s{position:absolute;border-radius:50%;background:rgba(30,25,40,0.06);z-index:1;pointer-events:none}.ink-s:nth-child(1){width:8px;height:8px;top:120px;right:80px}.ink-s:nth-child(2){width:5px;height:5px;bottom:150px;left:90px}.ink-s:nth-child(3){width:12px;height:10px;bottom:60px;right:120px;border-radius:60% 40% 50% 50%}.pc{position:absolute;bottom:0;right:0;width:40px;height:40px;background:linear-gradient(135deg,transparent 50%,#e8dcc6 50%,#ddd0b8 100%);z-index:3;border-radius:0 0 12px 0}.bl{position:relative;z-index:5;display:block;text-align:center;margin-top:16px;font-family:'Bad Script',cursive;font-size:0.95rem;color:#8a7a6a;text-decoration:none;transition:color 0.3s}.bl:hover{color:#3a2e28}.st,.ta,.end{animation:fadeIn 1.5s ease-out both}.ta{animation-delay:0.2s}.st{animation-delay:0.6s}.end{animation-delay:1.2s}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@media(max-width:520px){.nb{padding:40px 28px 50px 58px}.fr{width:180px;height:130px}.st{font-size:1.05rem;line-height:32px}.ta h1{font-size:1.5rem}.lang-sw{top:8px;right:8px}}

<script>
const T={
  ru:{badge:"предпоследняя страница",title:"Когда тетрадь закрывается",p1:"В одной тетради на разных страницах жили два кота. Рыжая кошечка с цветком за ухом жила ближе к началу — там, где строчки ещё ровные и пахнут новой бумагой. А светлый кот жил ближе к концу — там, где страницы чуть мятые и уголки загнуты.",p2:"Они не могли встретиться — между ними было слишком много страниц.",p3:"Но каждую ночь, когда тетрадь закрывалась, страницы прижимались друг к другу. И тогда рыжая кошечка чувствовала тепло — будто кто-то рядом. А светлый кот переставал плакать — потому что чернила на соседней странице пахли цветами.",p4:"Иногда он всё-таки плакал. Не от грусти, а от того, что скучал слишком сильно. Его слёзы просачивались сквозь бумагу — и на странице рыжей кошечки появлялись маленькие пятнышки. Она не вытирала их. Она рисовала из них сердечки.",p5:"Говорят, если пролистать тетрадь очень быстро — можно увидеть, как два кота на мгновение оказываются на одной странице. И улыбаются.",back:"← назад к тетради"},
  bg:{badge:"предпоследната страница",title:"Когато тетрадката се затваря",p1:"В една тетрадка на различни страници живееха две котета. Рижаво коте с цвете зад ухото живееше по-близо до началото — там, където редовете още са равни и миришат на нова хартия. А светлото коте живееше по-близо до края — там, където страниците са леко намачкани и ъглите — подвити.",p2:"Не можеха да се срещнат — между тях имаше твърде много страници.",p3:"Но всяка нощ, когато тетрадката се затваряше, страниците се притискаха една до друга. И тогава рижавото коте усещаше топлина — сякаш някой е наблизо. А светлото коте спираше да плаче — защото мастилото от съседната страница ухаеше на цветя.",p4:"Понякога все пак плачеше. Не от тъга, а защото скучаеше прекалено силно. Сълзите му просмукваха хартията — и на страницата на рижавото коте се появяваха малки петънца. То не ги изтриваше. Рисуваше от тях сърчица.",p5:"Казват, че ако прелистиш тетрадката много бързо — можеш да видиш как двете котета за миг се оказват на една страница. И се усмихват.",back:"← назад към тетрадката"},
  ua:{badge:"передостання сторінка",title:"Коли зошит закривається",p1:"В одному зошиті на різних сторінках жили два коти. Руда кішечка з квіткою за вухом жила ближче до початку — там, де рядки ще рівні й пахнуть новим папером. А світлий кіт жив ближче до кінця — там, де сторінки трохи зім\'яті й куточки загнуті.",p2:"Вони не могли зустрітися — між ними було занадто багато сторінок.",p3:"Але щоночі, коли зошит закривався, сторінки притискалися одна до одної. І тоді руда кішечка відчувала тепло — ніби хтось поруч. А світлий кіт переставав плакати — бо чорнило на сусідній сторінці пахло квітами.",p4:"Іноді він все одно плакав. Не від суму, а від того, що сумував занадто сильно. Його сльози просочувалися крізь папір — і на сторінці рудої кішечки з\'являлися маленькі плямки. Вона не витирала їх. Вона малювала з них сердечка.",p5:"Кажуть, якщо перегортати зошит дуже швидко — можна побачити, як два коти на мить опиняються на одній сторінці. І посміхаються.",back:"← назад до зошита"},
  en:{badge:"the penultimate page",title:"When the Notebook Closes",p1:"In one notebook, on different pages, there lived two cats. A ginger kitten with a flower behind her ear lived closer to the beginning — where the lines are still straight and smell of new paper. A light-colored cat lived closer to the end — where the pages are slightly crumpled and the corners are turned down.",p2:"They couldn't meet — there were too many pages between them.",p3:"But every night, when the notebook closed, the pages pressed against each other. And then the ginger kitten felt warmth — as if someone was near. And the light cat stopped crying — because the ink on the neighboring page smelled of flowers.",p4:"Sometimes he still cried. Not from sadness, but because he missed her too much. His tears seeped through the paper — and on the ginger kitten's page tiny spots appeared. She didn't wipe them away. She drew little hearts from them.",p5:"They say if you flip through the notebook very fast — you can see both cats on the same page for just a moment. And they're smiling.",back:"← back to the notebook"}
};
function getLang(){const h=location.hash.replace('#','');return['ru','bg','en','ua'].includes(h)?h:'ru'}
function setLang(l){location.hash=l==='ru'?'':l;document.querySelectorAll('[data-t]').forEach(e=>{const k=e.getAttribute('data-t');if(T[l]&&T[l][k])e.textContent=T[l][k]});document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));const bk=document.querySelector('.bl');if(bk)bk.href='../'+(l!=='ru'?'#'+l:'')}
setLang(getLang());
</script></body></html>
