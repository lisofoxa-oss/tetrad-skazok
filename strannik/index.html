<script>
const T={
  ru:{title:"Странник и сердце леса",p1:"В глубине старого леса жил маленький Странник в остроконечном капюшоне. Его никто не видел днём, но ночью можно было заметить, как между деревьями мелькает его тень. Он не был человеком. И не был духом. Он был тем, кто слушает.",p2:"Когда листья падали — он знал, с какого дерева. Когда зверёк терялся — он первым находил его след. А если лесу становилось грустно — на его плаще появлялись тёмные пятна.",p3:"Однажды лес начал странно себя вести. Ветки больше не шептались, птицы замолчали, а ручей стал течь слишком тихо, будто боялся шуметь. Даже воздух стал тяжёлым. Странник присел у корней старой сосны и закрыл глаза. Лес сказал ему одно слово:",d1:"— Украли.",p4:"В самой глубокой части чащи хранилось Сердце Леса — маленький зелёный огонёк. Он согревал корни, давал зверям смелость и помогал деревьям расти. И он пропал, в один момент его не стало.",p5:"Странник пошёл туда, где всегда лежал туман. Там, среди перекрученных ветвей, он увидел существо, собранное из сухих палок, мха и опавших листьев. В его груди светился слабый зелёный огонёк.",d2:"— Это не твоё, — тихо сказал Странник.",p6:"Существо вздрогнуло.",d3:"— Но без него я никто... Я просто гниль и тень. С огнём я чувствую тепло.",p7:"Странник долго молчал. Потом снял свой шарф и повязал существу на шею.",d4:"— Тепло не крадут. Его дают.",p8:"Он осторожно коснулся огонька, и тот сам выскользнул из груди существа и полетел обратно к корням деревьев. Лес глубоко вдохнул. Где-то запела первая птица.",p9:"Существо не исчезло. Оно стало частью леса — хранителем тумана. А Странник снова растворился между деревьями. Иногда дети, забрёдшие слишком далеко, чувствуют лёгкое прикосновение к плечу и слышат шёпот:",d5:"— Лес тебя слышит.",p10:"И это значит, что он рядом.",back:"← назад к тетради"},
  bg:{title:"Странникът и сърцето на гората",p1:"В дълбините на старата гора живееше малък Странник с островръх качулка. Никой не го виждаше през деня, но нощем можеше да забележиш как сянката му мярка между дърветата. Не беше човек. И не беше дух. Той беше този, който слуша.",p2:"Когато листата падаха — знаеше от кое дърво. Когато зверче се изгубваше — пръв намираше следата му. А ако на гората й ставаше тъжно — по наметалото му се появяваха тъмни петна.",p3:"Веднъж гората започна да се държи странно. Клоните вече не шепнеха, птиците замлъкнаха, а потокът потече прекалено тихо, сякаш се боеше да шуми. Дори въздухът натежа. Странникът седна до корените на стар бор и затвори очи. Гората му каза една дума:",d1:"— Откраднаха.",p4:"В най-дълбоката част на гъсталака се пазеше Сърцето на Гората — малко зелено пламъче. То стопляше корените, даваше смелост на зверовете и помагаше на дърветата да растат. И то изчезна — в един миг го нямаше.",p5:"Странникът тръгна натам, където винаги лежеше мъгла. Там, сред усукани клони, видя същество, събрано от сухи пръчки, мъх и окапали листа. В гърдите му светеше слабо зелено пламъче.",d2:"— Това не е твое — тихо каза Странникът.",p6:"Съществото потръпна.",d3:"— Но без него съм никой... Просто гнилоч и сянка. С огъня усещам топлина.",p7:"Странникът дълго мълча. После свали шала си и го завърза на шията на съществото.",d4:"— Топлината не се краде. Тя се дарява.",p8:"Той предпазливо докосна пламъчето и то само се изплъзна от гърдите на съществото и полетя обратно към корените на дърветата. Гората дълбоко въздъхна. Някъде запя първата птица.",p9:"Съществото не изчезна. Стана част от гората — пазител на мъглата. А Странникът отново се разтвори между дърветата. Понякога деца, забредли прекалено далеч, усещат леко докосване по рамото и чуват шепот:",d5:"— Гората те чува.",p10:"И това значи, че той е наблизо.",back:"← назад към тетрадката"},
  ua:{title:"Мандрівник і серце лісу",p1:"У глибині старого лісу жив маленький Мандрівник у гострому каптурі. Його ніхто не бачив удень, але вночі можна було помітити, як між деревами мелькає його тінь. Він не був людиною. І не був духом. Він був тим, хто слухає.",p2:"Коли листя падало — він знав, з якого дерева. Коли звірятко губилося — він першим знаходив його слід. А якщо лісу ставало сумно — на його плащі з\'являлися темні плями.",p3:"Одного разу ліс почав дивно себе поводити. Гілки більше не шепотіли, птахи замовкли, а струмок потік надто тихо, ніби боявся шуміти. Навіть повітря стало важким. Мандрівник присів біля коренів старої сосни й заплющив очі. Ліс сказав йому одне слово:",d1:"— Вкрали.",p4:"У найглибшій частині хащі зберігалося Серце Лісу — маленький зелений вогник. Він зігрівав коріння, давав звірам сміливість і допомагав деревам рости. І він зник — в одну мить його не стало.",p5:"Мандрівник пішов туди, де завжди лежав туман. Там, серед перекручених гілок, він побачив істоту, зібрану із сухих паличок, моху й опалого листя. У її грудях світився слабкий зелений вогник.",d2:"— Це не твоє, — тихо сказав Мандрівник.",p6:"Істота здригнулася.",d3:"— Але без нього я ніхто... Я просто гниль і тінь. З вогнем я відчуваю тепло.",p7:"Мандрівник довго мовчав. Потім зняв свій шарф і пов\'язав істоті на шию.",d4:"— Тепло не крадуть. Його дарують.",p8:"Він обережно торкнувся вогника, і той сам вислизнув із грудей істоти й полетів назад до коренів дерев. Ліс глибоко зітхнув. Десь заспівав перший птах.",p9:"Істота не зникла. Вона стала частиною лісу — охоронцем туману. А Мандрівник знову розчинився між деревами. Іноді діти, які забрели занадто далеко, відчувають легкий дотик до плеча й чують шепіт:",d5:"— Ліс тебе чує.",p10:"І це означає, що він поруч.",back:"← назад до зошита"},
  en:{title:"The Wanderer and the Heart of the Forest",p1:"Deep in an old forest lived a little Wanderer in a pointed hood. No one saw him by day, but at night you could catch his shadow flickering between the trees. He was not a person. And he was not a spirit. He was the one who listens.",p2:"When leaves fell — he knew from which tree. When a little creature got lost — he was the first to find its trail. And if the forest grew sad — dark spots appeared on his cloak.",p3:"One day the forest began to act strangely. The branches no longer whispered, the birds fell silent, and the stream flowed too quietly, as if afraid to make noise. Even the air grew heavy. The Wanderer sat by the roots of an old pine and closed his eyes. The forest said one word:",d1:"— Stolen.",p4:"In the deepest part of the thicket, the Heart of the Forest was kept — a small green flame. It warmed the roots, gave the animals courage, and helped the trees grow. And it vanished — in one moment it was gone.",p5:"The Wanderer went to where the fog always lay. There, among twisted branches, he saw a creature assembled from dry sticks, moss, and fallen leaves. In its chest glowed a faint green flame.",d2:"— That is not yours, — the Wanderer said quietly.",p6:"The creature flinched.",d3:"— But without it I'm nobody... Just rot and shadow. With the fire I feel warmth.",p7:"The Wanderer was silent for a long time. Then he took off his scarf and tied it around the creature's neck.",d4:"— Warmth is not stolen. It is given.",p8:"He carefully touched the flame, and it slipped out of the creature's chest on its own and flew back to the roots of the trees. The forest took a deep breath. Somewhere the first bird began to sing.",p9:"The creature did not disappear. It became part of the forest — the keeper of the fog. And the Wanderer dissolved among the trees once more. Sometimes children who wander too far feel a light touch on their shoulder and hear a whisper:",d5:"— The forest hears you.",p10:"And that means he is near.",back:"← back to the notebook"}
};
function getLang(){const h=location.hash.replace('#','');return['ru','bg','en','ua'].includes(h)?h:'ru'}
function setLang(l){location.hash=l==='ru'?'':l;document.querySelectorAll('[data-t]').forEach(e=>{const k=e.getAttribute('data-t');if(T[l]&&T[l][k])e.textContent=T[l][k]});document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));const bk=document.querySelector('.bl');if(bk)bk.href='../'+(l!=='ru'?'#'+l:'')}
setLang(getLang());
</script></body></html>
