<script>
const T={
  ru:{title:"Лиора и огонёк",p1:"Жила в глубине леса девочка по имени Лиора. Её часто называли лесной — не потому что у неё был дом из веток (хотя и такой был), а потому что она умела дружить со всеми: с ветром, который играл в её волосах, с птицами, что садились ей на плечи, и даже с ворчливыми старыми деревьями.",p2:"Лиора всегда улыбалась. Если где-то становилось грустно — она приходила, садилась рядом и как будто сама приносила с собой немного солнца.",p3:"Однажды вечером, когда лес уже начал засыпать, Лиора увидела вдалеке маленький огонёк. Он мерцал между деревьями — то появлялся, то исчезал.",d1:"— Привет! — радостно позвала она и подошла ближе. — Ты кто?",p4:"Огонёк вспыхнул чуть ярче, будто удивился.",d2:"— Я просто огонь, — тихо ответил он. — Со мной лучше не дружить. Я обжигаю.",p5:"Но Лиора только улыбнулась.",d3:"— А я не боюсь. Давай попробуем.",p6:"Она села рядом, не слишком близко, и начала рассказывать ему про утренние росы, про смешных белок и про то, как листья шуршат, будто шепчут секреты. Сначала огонёк нервно трещал и вспыхивал, боялся задеть её. Но Лиора не тянулась к нему руками — она просто была рядом.",p7:"День за днём она приходила к нему. И огонёк стал мягче. Он уже не вспыхивал резко, а светил ровно и тепло. Ему впервые не хотелось никого пугать.",d4:"— Знаешь, — сказал он однажды, — раньше я думал, что я только разрушать умею.",p8:"Лиора покачала головой.",d5:"— Ты ещё умеешь светить. И согревать. Просто тебе нужен был кто-то, кто это увидит.",p9:"С тех пор в лесу стало чуть светлее по вечерам. А Лиора доказала всем — даже огню, что дружба не боится осторожности, если в ней есть тепло.",back:"← назад к тетради"},
  bg:{title:"Лиора и огънчето",p1:"В дълбините на гората живееше момиче на име Лиора. Често я наричаха горска — не защото имаше къща от клони (макар че имаше и такава), а защото умееше да се сприятелява с всички: с вятъра, който играеше в косите й, с птиците, които кацаха на раменете й, и дори с мърморещите стари дървета.",p2:"Лиора винаги се усмихваше. Ако някъде ставаше тъжно — тя идваше, сядаше наблизо и сякаш сама носеше със себе си малко слънце.",p3:"Една вечер, когато гората вече започваше да заспива, Лиора видя в далечината малко пламъче. То проблясваше между дърветата — ту се появяваше, ту изчезваше.",d1:"— Здравей! — радостно извика тя и се приближи. — Ти кой си?",p4:"Огънчето лумна малко по-ярко, сякаш се изненада.",d2:"— Аз съм просто огън — тихо отговори то. — По-добре не се сприятелявай с мен. Аз изгарям.",p5:"Но Лиора само се усмихна.",d3:"— А аз не се боя. Да опитаме.",p6:"Тя седна наблизо, не прекалено близо, и започна да му разказва за утринните роси, за смешните катерички и за това как листата шумолят, сякаш шепнат тайни. Отначало огънчето нервно пукаше и лумваше, страхуваше се да не я докосне. Но Лиора не протягаше ръце към него — просто беше наблизо.",p7:"Ден след ден тя идваше при него. И огънчето стана по-меко. Вече не лумваше рязко, а светеше равно и топло. За пръв път не искаше да плаши никого.",d4:"— Знаеш ли — каза то един ден, — преди мислех, че мога само да разрушавам.",p8:"Лиора поклати глава.",d5:"— Ти умееш и да светиш. И да стопляш. Просто ти трябваше някой, който да го види.",p9:"Оттогава в гората стана малко по-светло вечер. А Лиора доказа на всички — дори на огъня, че приятелството не се бои от предпазливост, ако в него има топлина.",back:"← назад към тетрадката"},
  en:{title:"Liora and the Little Flame",p1:"Deep in the forest lived a girl named Liora. She was often called the forest girl — not because she had a house made of branches (though she did), but because she knew how to befriend everyone: the wind that played in her hair, the birds that perched on her shoulders, and even the grumpy old trees.",p2:"Liora always smiled. If somewhere felt sad — she would come, sit nearby, and somehow bring a little sunshine with her.",p3:"One evening, when the forest had already begun to fall asleep, Liora saw a small flame in the distance. It flickered between the trees — appearing and disappearing.",d1:"— Hello! — she called out cheerfully and stepped closer. — Who are you?",p4:"The flame flared a little brighter, as if surprised.",d2:"— I'm just fire, — it answered quietly. — You'd better not be friends with me. I burn.",p5:"But Liora only smiled.",d3:"— I'm not afraid. Let's try.",p6:"She sat down nearby, not too close, and began telling it about morning dew, funny squirrels, and how leaves rustle as if whispering secrets. At first the flame crackled nervously and flared up, afraid of touching her. But Liora didn't reach for it — she was simply there.",p7:"Day after day she came to visit. And the flame grew softer. It no longer flared sharply, but glowed evenly and warmly. For the first time, it didn't want to scare anyone.",d4:"— You know, — it said one day, — I used to think all I could do was destroy.",p8:"Liora shook her head.",d5:"— You can also shine. And warm. You just needed someone to see it.",p9:"Since then, the forest became a little brighter in the evenings. And Liora proved to everyone — even to fire — that friendship is not afraid of caution, as long as it has warmth.",back:"← back to the notebook"},
  ua:{title:"Ліора і вогник",p1:"У глибині лісу жила дівчинка на ім'я Ліора. Її часто називали лісовою — не тому що в неї був дім із гілок (хоча й такий був), а тому що вона вміла дружити з усіма: з вітром, що грався в її волоссі, з пташками, що сідали їй на плечі, і навіть із буркотливими старими деревами.",p2:"Ліора завжди посміхалася. Якщо десь ставало сумно — вона приходила, сідала поруч і ніби сама приносила з собою трохи сонця.",p3:"Одного вечора, коли ліс уже починав засинати, Ліора побачила вдалині маленький вогник. Він мерехтів між деревами — то з'являвся, то зникав.",d1:"— Привіт! — радісно гукнула вона й підійшла ближче. — Ти хто?",p4:"Вогник спалахнув трохи яскравіше, ніби здивувався.",d2:"— Я просто вогонь, — тихо відповів він. — Зі мною краще не дружити. Я обпалюю.",p5:"Але Ліора лише посміхнулася.",d3:"— А я не боюся. Давай спробуємо.",p6:"Вона сіла поруч, не занадто близько, й почала розповідати йому про ранкові роси, про кумедних білочок і про те, як листя шарудить, ніби шепоче секрети. Спочатку вогник нервово тріщав і спалахував, боявся її зачепити. Але Ліора не тягнулася до нього руками — вона просто була поруч.",p7:"День за днем вона приходила до нього. І вогник став м'якшим. Він уже не спалахував різко, а світив рівно й тепло. Йому вперше не хотілося нікого лякати.",d4:"— Знаєш, — сказав він одного разу, — раніше я думав, що вмію тільки руйнувати.",p8:"Ліора похитала головою.",d5:"— Ти ще вмієш світити. І зігрівати. Просто тобі потрібен був хтось, хто це побачить.",p9:"Відтоді в лісі стало трохи світліше вечорами. А Ліора довела всім — навіть вогню, що дружба не боїться обережності, якщо в ній є тепло.",back:"← назад до зошита"}
};
function getLang(){const h=location.hash.replace('#','');return['ru','bg','en','ua'].includes(h)?h:'ru'}
function setLang(l){location.hash=l==='ru'?'':l;document.querySelectorAll('[data-t]').forEach(e=>{const k=e.getAttribute('data-t');if(T[l]&&T[l][k])e.textContent=T[l][k]});document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));const bk=document.querySelector('.bl');if(bk)bk.href='../'+(l!=='ru'?'#'+l:'')}
setLang(getLang());
</script></body></html>
