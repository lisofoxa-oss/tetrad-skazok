<title>Совушкин чай</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bad+Script&family=Marck+Script&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1520;background-image:radial-gradient(ellipse at 20% 50%,rgba(80,50,90,0.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(40,50,100,0.25) 0%,transparent 50%);padding:40px 20px;font-family:'Bad Script',cursive}.lang-sw{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:4px;background:rgba(30,22,36,0.85);padding:4px;border-radius:8px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.4)}.lb{font-family:'Bad Script',cursive;font-size:0.85rem;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:#8a7a6a;transition:all 0.2s}.lb:hover{color:#e8dcc6}.lb.on{background:#e8dcc6;color:#1a1520}.nb{position:relative;max-width:660px;width:100%;background:#f5eed9;background-image:linear-gradient(rgba(0,0,0,0) 0px,rgba(0,0,0,0) 31px,#c9b99a44 31px,#c9b99a44 32px);background-size:100% 32px;border-radius:4px 12px 12px 4px;padding:48px 50px 60px 70px;box-shadow:-4px 0 0 #e8dcc6,-8px 0 0 #ddd0b8,0 8px 40px rgba(0,0,0,0.5),0 2px 10px rgba(0,0,0,0.3);overflow:hidden}.nb::before{content:'';position:absolute;left:54px;top:0;bottom:0;width:2px;background:rgba(200,80,80,0.3)}.nb::after{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,#ede4cc,#f2e9d2);border-right:1px solid rgba(0,0,0,0.05)}.holes{position:absolute;left:16px;top:0;bottom:0;z-index:2}.hole{width:16px;height:16px;background:#1a1520;border-radius:50%;position:absolute;left:0;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3)}.hole:nth-child(1){top:80px}.hole:nth-child(2){top:280px}.hole:nth-child(3){top:480px}.hole:nth-child(4){top:680px}.hole:nth-child(5){top:880px}.ta{text-align:center;margin-bottom:28px;position:relative;z-index:1}.ta h1{font-family:'Marck Script',cursive;font-size:2rem;color:#3a2e28;font-weight:400;letter-spacing:1px;position:relative;display:inline-block}.ta h1 <script>
const T={
  ru:{title:"Совушкин чай",p1:"Жила-была в тихом лесу маленькая умная совушка. Она очень любила читать старые книги, наблюдать за звёздами и больше всего на свете увлекалась чаями.",p2:"У неё была маленькая полянка, где росли разные травы: мята, ромашка, чабрец и даже несколько загадочных растений, о которых знала только она. Каждую ночь совушка заваривала новый чай и записывала рецепт в свой толстый блокнот.",n1:"«Мятный чай — помогает думать яснее.»",n2:"«Ромашковый — делает сон мягким и спокойным.»",n3:"«Чай из лесных ягод — поднимает настроение и веселит.»",p3:"Однажды в лес пришёл холодный ветер, и звери стали грустными и уставшими. Тогда совушка поставила свой маленький чайник на огонь и пригласила всех на полянку.",p4:"Зайцу она дала бодрящий чай с мятой. Лисёнку — тёплый сладкий чай с ягодами. А ёжику — ромашковый, чтобы он наконец выспался.",p5:"Звери сидели вместе, пили чай, слушали мудрые советы совушки и постепенно в лесу снова стало тепло и уютно.",p6:"С тех пор все знали: если в лесу грустно или холодно — нужно просто прийти к совушке на чашечку чая.",p7:"Потому что её чай умел согревать не только лапки, но и сердца.",back:"← назад к тетради"},
  bg:{title:"Чаят на совичката",p1:"Живяла в тиха гора малка умна совичка. Тя много обичаше да чете стари книги, да наблюдава звездите и най-вече на света се увличаше по чаевете.",p2:"Имаше си малка полянка, където растяха различни билки: мента, лайка, мащерка и дори няколко загадъчни растения, за които знаеше само тя. Всяка нощ совичката запарваше нов чай и записваше рецептата в дебелия си бележник.",n1:"«Ментов чай — помага да мислиш по-ясно.»",n2:"«Лайков — прави съня мек и спокоен.»",n3:"«Чай от горски плодове — повдига настроението и весели.»",p3:"Веднъж в гората дойде студен вятър и зверчетата станаха тъжни и уморени. Тогава совичката сложи малкото си чайниче на огъня и покани всички на полянката.",p4:"На зайчето даде бодрящ чай с мента. На лисичето — топъл сладък чай с горски плодове. А на таралежчето — лайков, за да може най-после да се наспи.",p5:"Зверчетата седяха заедно, пиеха чай, слушаха мъдрите съвети на совичката и постепенно в гората отново стана топло и уютно.",p6:"Оттогава всички знаеха: ако в гората е тъжно или студено — просто трябва да отидеш при совичката за чашка чай.",p7:"Защото нейният чай умееше да стопля не само лапичките, но и сърцата.",back:"← назад към тетрадката"},
  en:{title:"The Owl's Tea",p1:"Once upon a time, in a quiet forest, there lived a small, wise little owl. She loved reading old books, watching the stars, and more than anything in the world, she was passionate about tea.",p2:"She had a little clearing where different herbs grew: mint, chamomile, thyme, and even a few mysterious plants that only she knew about. Every night the owl brewed a new tea and wrote down the recipe in her thick notebook.",n1:"'Mint tea — helps you think more clearly.'",n2:"'Chamomile — makes sleep soft and peaceful.'",n3:"'Wild berry tea — lifts the spirits and brings joy.'",p3:"One day a cold wind came to the forest, and the animals grew sad and tired. So the owl put her little kettle on the fire and invited everyone to her clearing.",p4:"She gave the hare an invigorating mint tea. The little fox got a warm, sweet berry tea. And the hedgehog got chamomile, so he could finally get some sleep.",p5:"The animals sat together, drank tea, listened to the owl's wise advice, and gradually the forest became warm and cozy again.",p6:"From then on, everyone knew: if the forest feels sad or cold — you just need to visit the owl for a cup of tea.",p7:"Because her tea could warm not only paws, but also hearts.",back:"← back to the notebook"},
  ua:{title:"Совинний чай",p1:"Жила-була в тихому лісі маленька розумна совонька. Вона дуже любила читати старі книжки, спостерігати за зірками і найбільше на світі захоплювалася чаями.",p2:"У неї була маленька галявинка, де росли різні трави: м'ята, ромашка, чебрець і навіть кілька загадкових рослин, про які знала тільки вона. Щоночі совонька заварювала новий чай і записувала рецепт у свій товстий блокнот.",n1:"«М'ятний чай — допомагає думати ясніше.»",n2:"«Ромашковий — робить сон м'яким і спокійним.»",n3:"«Чай із лісових ягід — піднімає настрій і веселить.»",p3:"Одного разу в ліс прийшов холодний вітер, і звірі стали сумними й втомленими. Тоді совонька поставила свій маленький чайничок на вогонь і запросила всіх на галявинку.",p4:"Зайчику вона дала бадьорий чай із м'ятою. Лисеняті — теплий солодкий чай із ягодами. А їжачку — ромашковий, щоб він нарешті виспався.",p5:"Звірі сиділи разом, пили чай, слухали мудрі поради совоньки і поступово в лісі знову стало тепло й затишно.",p6:"Відтоді всі знали: якщо в лісі сумно чи холодно — треба просто прийти до совоньки на чашечку чаю.",p7:"Бо її чай умів зігрівати не лише лапки, а й серця.",back:"← назад до зошита"}
};
function getLang(){const h=location.hash.replace('#','');return['ru','bg','en','ua'].includes(h)?h:'ru'}
function setLang(l){location.hash=l==='ru'?'':l;document.querySelectorAll('[data-t]').forEach(e=>{const k=e.getAttribute('data-t');if(T[l]&&T[l][k])e.textContent=T[l][k]});document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));const bk=document.querySelector('.bl');if(bk)bk.href='../'+(l!=='ru'?'#'+l:'')}
setLang(getLang());
</script></body></html>
