<style>
  @import url('https://fonts.googleapis.com/css2?family=Bad+Script&family=Marck+Script&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1520;background-image:radial-gradient(ellipse at 20% 50%,rgba(80,50,90,0.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(40,50,100,0.25) 0%,transparent 50%);padding:40px 20px;font-family:'Bad Script',cursive}.lang-sw{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:4px;background:rgba(30,22,36,0.85);padding:4px;border-radius:8px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.4)}.lb{font-family:'Bad Script',cursive;font-size:0.85rem;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:#8a7a6a;transition:all 0.2s}.lb:hover{color:#e8dcc6}.lb.on{background:#e8dcc6;color:#1a1520}.nb{position:relative;max-width:660px;width:100%;background:#f5eed9;background-image:linear-gradient(rgba(0,0,0,0) 0px,rgba(0,0,0,0) 31px,#c9b99a44 31px,#c9b99a44 32px);background-size:100% 32px;border-radius:4px 12px 12px 4px;padding:48px 50px 60px 70px;box-shadow:-4px 0 0 #e8dcc6,-8px 0 0 #ddd0b8,0 8px 40px rgba(0,0,0,0.5),0 2px 10px rgba(0,0,0,0.3);overflow:hidden}.nb::before{content:'';position:absolute;left:54px;top:0;bottom:0;width:2px;background:rgba(200,80,80,0.3)}.nb::after{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,#ede4cc,#f2e9d2);border-right:1px solid rgba(0,0,0,0.05)}.holes{position:absolute;left:16px;top:0;bottom:0;z-index:2}.hole{width:16px;height:16px;background:#1a1520;border-radius:50%;position:absolute;left:0;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3)}.hole:nth-child(1){top:80px}.hole:nth-child(2){top:280px}.hole:nth-child(3){top:480px}.hole:nth-child(4){top:680px}.hole:nth-child(5){top:880px}.ta{text-align:center;margin-bottom:28px;position:relative;z-index:1}.ta h1{font-family:'Marck Script',cursive;font-size:2rem;color:#3a2e28;font-weight:400;letter-spacing:1px;position:relative;display:inline-block}.ta h1::after{content:'';position:absolute;bottom:-4px;left:-10%;width:120%;height:1px;background:linear-gradient(to right,transparent,#8a7a6a,transparent)}.st{position:relative;z-index:1;font-family:'Bad Script',cursive;font-size:1.25rem;line-height:32px;color:#2c2420;text-align:left}.st p{text-indent:2em;margin-bottom:0}.st p+p{margin-top:4px}.fl{float:left;width:200px;height:280px;margin:0 24px 10px -10px;shape-outside:ellipse(50% 48% at 50% 50%);position:relative}.fl img{width:100%;height:100%;object-fit:contain}.dial{text-indent:0!important;padding-left:1em;font-style:italic;color:#3a3228}.warm{text-indent:0!important;text-align:center;font-size:1.15rem;color:#6a3a3a;margin:10px 0;font-style:italic}.end{text-align:center;margin-top:20px;font-family:'Marck Script',cursive;font-size:1.1rem;color:#8a7a6a;letter-spacing:2px;position:relative;z-index:1}.end::before,.end::after{content:'~';margin:0 12px;opacity:0.5}.ink-s{position:absolute;border-radius:50%;background:rgba(30,25,40,0.06);z-index:1;pointer-events:none}.ink-s:nth-child(1){width:8px;height:8px;top:120px;right:80px}.ink-s:nth-child(2){width:5px;height:5px;bottom:150px;left:90px}.ink-s:nth-child(3){width:12px;height:10px;bottom:60px;right:120px;border-radius:60% 40% 50% 50%}.pc{position:absolute;bottom:0;right:0;width:40px;height:40px;background:linear-gradient(135deg,transparent 50%,#e8dcc6 50%,#ddd0b8 100%);z-index:3;border-radius:0 0 12px 0}.bl{position:relative;z-index:5;display:block;text-align:center;margin-top:16px;font-family:'Bad Script',cursive;font-size:0.95rem;color:#8a7a6a;text-decoration:none;transition:color 0.3s}.bl:hover{color:#3a2e28}.st,.ta,.end{animation:fadeIn 1.5s ease-out both}.ta{animation-delay:0.2s}.st{animation-delay:0.6s}.end{animation-delay:1.2s}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@media(max-width:520px){.nb{padding:40px 28px 50px 58px}.fl{width:140px;height:200px}.st{font-size:1.05rem;line-height:32px}.ta h1{font-size:1.5rem}.lang-sw{top:8px;right:8px}}
</style></head><body>

<script>
const T={
  ru:{title:"Тимкин суп",p1:"Жил-был зайчонок Тимка, и был он немного странный. Пока остальные зайцы грызли морковку, он носился по лесу с кастрюлей и записывал рецепты. Его мечта? Приготовить самый идеальный брокколевый суп.",p2:"Но была проблема — у него никогда не получалось так, как он хотел. То суп слишком горький, то слишком жидкий, то вообще так, что даже улитка разворачивалась и уползала.",p3:"Однажды он услышал, что в глубине леса растёт особенная брокколи — та самая, из которой получается идеальный вкус. Конечно, Тимка сразу туда пошёл. В лесу было темно, странно и немного страшно. В какой-то момент он даже подумал развернуться... но потом сказал себе:",d1:"— Ну уж нет. Я почти легендарный повар, я не сдаюсь.",p4:"Он нашёл эту брокколи — маленькую, кривую и вообще не особо красивую. «Серьёзно?» — сказал Тимка, но всё равно взял её.",p5:"Вернувшись домой, он приготовил суп. Без особых ожиданий. Попробовал... И завис. Суп был обычный. Не идеальный. Не волшебный. Но почему-то именно этот он доел до конца, не думая о том, что «могло быть лучше».",p6:"И тут до него дошло: он всё время пытался сделать идеальный суп, вместо того чтобы просто готовить с удовольствием.",p7:"С тех пор Тимка больше не гнался за идеалом. Он просто готовил. Иногда вкусно, иногда не очень — но всегда с улыбкой.",p8:"И знаешь что?",p9:"Именно эти супы зверята потом и называли самыми вкусными.",p10:"",back:"← назад к тетради"},
  bg:{title:"Супата на Тимка",p1:"Живяло едно зайче на име Тимка и беше малко странно. Докато останалите зайци гризяха моркови, то тичаше из гората с тенджера и записваше рецепти. Мечтата му? Да приготви най-идеалната супа от броколи.",p2:"Но имаше проблем — никога не му се получаваше както искаше. Ту супата е прекалено горчива, ту прекалено рядка, ту толкова зле, че дори охлювът се обръщаше и пълзеше надалеч.",p3:"Веднъж чу, че в дълбините на гората расте особен броколи — онзи, от който се получава идеалният вкус. Разбира се, Тимка веднага тръгна натам. В гората беше тъмно, странно и малко страшно. В някакъв момент дори помисли да се върне... но после си каза:",d1:"— Не, не! Аз съм почти легендарен готвач, не се предавам.",p4:"Намери този броколи — малък, крив и изобщо не особено красив. «Сериозно?» — каза Тимка, но все пак го взе.",p5:"Когато се върна вкъщи, приготви супа. Без особени очаквания. Опита... И замръзна. Супата беше обикновена. Не идеална. Не вълшебна. Но по някаква причина точно нея изяде до края, без да мисли, че «можеше да е по-добре».",p6:"И тогава му просветна: през цялото време се опитваше да направи идеалната супа, вместо просто да готви с удоволствие.",p7:"Оттогава Тимка вече не гонеше идеала. Просто готвеше. Понякога вкусно, понякога не чак толкова — но винаги с усмивка.",p8:"И знаеш ли какво?",p9:"Точно тези супи зверчетата после наричаха най-вкусните.",p10:"",back:"← назад към тетрадката"},
  en:{title:"Timka's Soup",p1:"Once there was a little bunny named Timka, and he was a bit strange. While other rabbits munched on carrots, he ran around the forest with a pot, writing down recipes. His dream? To make the most perfect broccoli soup.",p2:"But there was a problem — it never turned out the way he wanted. Sometimes the soup was too bitter, sometimes too thin, sometimes so bad that even the snail turned around and crawled away.",p3:"One day he heard that deep in the forest grew a special broccoli — the very one that makes the perfect flavor. Of course, Timka went there right away. The forest was dark, strange, and a little scary. At one point he even thought about turning back... but then he told himself:",d1:"— Oh no. I'm practically a legendary chef. I don't give up.",p4:"He found that broccoli — small, crooked, and not particularly pretty. 'Seriously?' said Timka, but took it anyway.",p5:"Back home, he made the soup. Without high hopes. He tasted it... And froze. The soup was ordinary. Not perfect. Not magical. But for some reason, this was the one he finished without thinking 'it could have been better.'",p6:"And then it hit him: he had spent all this time trying to make the perfect soup, instead of simply cooking with joy.",p7:"From then on, Timka stopped chasing perfection. He just cooked. Sometimes delicious, sometimes not so much — but always with a smile.",p8:"And you know what?",p9:"Those were the very soups the animals later called the tastiest.",p10:"",back:"← back to the notebook"},
  ua:{title:"Тимчин суп",p1:"Жив-був зайченятко Тимка, і був він трохи дивний. Поки інші зайці гризли моркву, він бігав по лісу з каструлею й записував рецепти. Його мрія? Приготувати найідеальніший суп із брокколі.",p2:"Але була проблема — у нього ніколи не виходило так, як він хотів. То суп занадто гіркий, то занадто рідкий, то взагалі такий, що навіть равлик розвертався й повзла геть.",p3:"Одного разу він почув, що в глибині лісу росте особлива брокколі — та сама, з якої виходить ідеальний смак. Звісно, Тимка одразу пішов туди. В лісі було темно, дивно й трохи страшно. В якийсь момент він навіть подумав повернути... але потім сказав собі:",d1:"— Ну ні. Я майже легендарний кухар, я не здаюся.",p4:"Він знайшов цю брокколі — маленьку, криву й зовсім не гарну. «Серйозно?» — сказав Тимка, але все одно взяв її.",p5:"Повернувшись додому, він приготував суп. Без особливих очікувань. Спробував... І завис. Суп був звичайний. Не ідеальний. Не чарівний. Але чомусь саме цей він доїв до кінця, не думаючи про те, що «могло бути краще».",p6:"І тут до нього дійшло: він увесь час намагався зробити ідеальний суп, замість того щоб просто готувати з задоволенням.",p7:"Відтоді Тимка більше не ганявся за ідеалом. Він просто готував. Іноді смачно, іноді не дуже — але завжди з посмішкою.",p8:"І знаєш що?",p9:"Саме ці супи звірятка потім і називали найсмачнішими.",p10:"",back:"← назад до зошита"}
};
function getLang(){const h=location.hash.replace('#','');return['ru','bg','en','ua'].includes(h)?h:'ru'}
function setLang(l){location.hash=l==='ru'?'':l;document.querySelectorAll('[data-t]').forEach(e=>{const k=e.getAttribute('data-t');if(T[l]&&T[l][k])e.textContent=T[l][k]});document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));const bk=document.querySelector('.bl');if(bk)bk.href='../'+(l!=='ru'?'#'+l:'')}
setLang(getLang());
</script></body></html>
