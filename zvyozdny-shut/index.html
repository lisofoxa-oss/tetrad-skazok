<!DOCTYPE html>

<title>Звёздный шут</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bad+Script&family=Marck+Script&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1520;background-image:radial-gradient(ellipse at 20% 50%,rgba(80,50,90,0.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(40,50,100,0.25) 0%,transparent 50%);padding:40px 20px;font-family:'Bad Script',cursive}.lang-sw{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:4px;background:rgba(30,22,36,0.85);padding:4px;border-radius:8px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.4)}.lb{font-family:'Bad Script',cursive;font-size:0.85rem;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:#8a7a6a;transition:all 0.2s}.lb:hover{color:#e8dcc6}.lb.on{background:#e8dcc6;color:#1a1520}.nb{position:relative;max-width:660px;width:100%;background:#f5eed9;background-image:linear-gradient(rgba(0,0,0,0) 0px,rgba(0,0,0,0) 31px,#c9b99a44 31px,#c9b99a44 32px);background-size:100% 32px;border-radius:4px 12px 12px 4px;padding:48px 50px 60px 70px;box-shadow:-4px 0 0 #e8dcc6,-8px 0 0 #ddd0b8,0 8px 40px rgba(0,0,0,0.5),0 2px 10px rgba(0,0,0,0.3);overflow:hidden}.nb::before{content:'';position:absolute;left:54px;top:0;bottom:0;width:2px;background:rgba(200,80,80,0.3)}.nb::after{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,#ede4cc,#f2e9d2);border-right:1px solid rgba(0,0,0,0.05)}.holes{position:absolute;left:16px;top:0;bottom:0;z-index:2}.hole{width:16px;height:16px;background:#1a1520;border-radius:50%;position:absolute;left:0;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3)}.hole:nth-child(1){top:80px}.hole:nth-child(2){top:280px}.hole:nth-child(3){top:480px}.hole:nth-child(4){top:680px}.ta{text-align:center;margin-bottom:28px;position:relative;z-index:1}.ta h1{font-family:'Marck Script',cursive;font-size:2rem;color:#3a2e28;font-weight:400;letter-spacing:1px;position:relative;display:inline-block}.ta h1::after{content:'';position:absolute;bottom:-4px;left:-10%;width:120%;height:1px;background:linear-gradient(to right,transparent,#8a7a6a,transparent)}.st{position:relative;z-index:1;font-family:'Bad Script',cursive;font-size:1.25rem;line-height:32px;color:#2c2420;text-align:left}.st p{text-indent:2em;margin-bottom:0}.st p+p{margin-top:4px}.fl{float:left;width:200px;height:340px;margin:0 24px 10px -10px;shape-outside:ellipse(50% 48% at 50% 50%);position:relative}.fl img{width:100%;height:100%;object-fit:contain}.end{text-align:center;margin-top:20px;font-family:'Marck Script',cursive;font-size:1.1rem;color:#8a7a6a;letter-spacing:2px;position:relative;z-index:1}.end::before,.end::after{content:'~';margin:0 12px;opacity:0.5}.ink-s{position:absolute;border-radius:50%;background:rgba(30,25,40,0.06);z-index:1;pointer-events:none}.ink-s:nth-child(1){width:8px;height:8px;top:120px;right:80px}.ink-s:nth-child(2){width:5px;height:5px;bottom:150px;left:90px}.ink-s:nth-child(3){width:12px;height:10px;bottom:60px;right:120px;border-radius:60% 40% 50% 50%}.pc{position:absolute;bottom:0;right:0;width:40px;height:40px;background:linear-gradient(135deg,transparent 50%,#e8dcc6 50%,#ddd0b8 100%);z-index:3;border-radius:0 0 12px 0}.bl{position:relative;z-index:5;display:block;text-align:center;margin-top:16px;font-family:'Bad Script',cursive;font-size:0.95rem;color:#8a7a6a;text-decoration:none;transition:color 0.3s}.bl:hover{color:#3a2e28}.st,.ta,.end{animation:fadeIn 1.5s ease-out both}.ta{animation-delay:0.2s}.st{animation-delay:0.6s}.end{animation-delay:1.2s}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@media(max-width:520px){.nb{padding:40px 28px 50px 58px}.fl{width:140px;height:240px}.st{font-size:1.05rem;line-height:32px}.ta h1{font-size:1.5rem}.lang-sw{top:8px;right:8px}}
</style></head><body>
<div class="lang-sw"><button class="lb on" onclick="setLang('ru')">RU</button><button class="lb" onclick="setLang('bg')">BG</button><button class="lb" onclick="setLang('en')">EN</button></div>
<div class="nb"><div class="holes"><div class="hole"></div><div class="hole"></div><div class="hole"></div><div class="hole"></div></div><div class="ink-s"></div><div class="ink-s"></div><div class="ink-s"></div>

<div class="st"><div class="fl"><img src="jester.png" alt=""></div>

<div class="end">✿</div><div class="pc"></div><a href="../" class="bl" data-t="back"></a></div>
<script>
const T={
  ru:{title:"Звёздный шут",p1:"В городе, который не отмечали ни на одной карте, жил Шут со звёздной шапкой. Он приходил туда, где фонари начинали мигать без причины, а окна сами собой темнели. Никто не знал, откуда он появляется — просто в какой-то момент он уже стоял на перекрёстке и смотрел.",p2:"Его улыбка была слишком ровной, будто её когда-то вырезали и больше не смогли убрать. Когда он проходил мимо людей, они вдруг вспоминали странные сны из детства — те, где кто-то стоит в темноте и зовёт по имени.",p3:"Шут никогда не говорил вслух, но рядом с ним мысли начинали звучать чужими.",p4:"Говорят, если он остановится напротив тебя и наклонит голову, на следующую ночь твоя тень будет двигаться чуть позже, чем ты сам. А Шут уйдёт дальше — чуть выше, чуть тоньше, словно собранный из чужих страхов.",back:"← назад к тетради"},
  bg:{title:"Звездният шут",p1:"В град, който не фигурираше на нито една карта, живееше Шут със звездна шапка. Той идваше там, където фенерите започваха да мигат без причина, а прозорците сами потъмняваха. Никой не знаеше откъде се появява — просто в някакъв момент вече стоеше на кръстопътя и гледаше.",p2:"Усмивката му беше прекалено равна, сякаш някога я бяха изрязали и повече не можеха да я махнат. Когато минаваше покрай хората, те изведнъж си спомняха странни сънища от детството — онези, в които някой стои в тъмното и те вика по име.",p3:"Шутът никога не говореше на глас, но до него мислите започваха да звучат чужди.",p4:"Казват, че ако спре срещу теб и наклони глава, следващата нощ сянката ти ще се движи малко по-бавно от теб самия. А Шутът ще тръгне нататък — малко по-висок, малко по-тънък, сякаш събран от чужди страхове.",back:"← назад към тетрадката"},
  en:{title:"The Starry Jester",p1:"In a city that appeared on no map, there lived a Jester with a starry hat. He came to places where streetlights began to flicker for no reason and windows darkened on their own. No one knew where he came from — at some point he was simply standing at the crossroads, watching.",p2:"His smile was too even, as if it had been carved once and could never be removed. When he passed by people, they suddenly remembered strange dreams from childhood — the ones where someone stands in the dark and calls your name.",p3:"The Jester never spoke aloud, but near him your thoughts began to sound like someone else's.",p4:"They say if he stops in front of you and tilts his head, the next night your shadow will move just a moment slower than you. And the Jester will walk on — a little taller, a little thinner, as if assembled from other people's fears.",back:"← back to the notebook"}
};
function getLang(){const h=location.hash.replace('#','');return['ru','bg','en'].includes(h)?h:'ru'}
function setLang(l){location.hash=l==='ru'?'':l;document.querySelectorAll('[data-t]').forEach(e=>{const k=e.getAttribute('data-t');if(T[l]&&T[l][k])e.textContent=T[l][k]});document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===l));const bk=document.querySelector('.bl');if(bk)bk.href='../'+(l!=='ru'?'#'+l:'')}
setLang(getLang());
</script></body></html>
